<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml" width="100%" height="100%">
  <foreignObject width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml" lang="en">
    <head>
      <meta charset="utf-8" />
      <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; }
        h1 { color: #aa0000; margin-bottom: 0.25rem; }
        p  { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .btn {
          display: block;
          width: 100%;
          margin-bottom: 0.6rem;
          padding: 0.65rem 1rem;
          background: #111;
          border: 1px solid #333;
          border-radius: 8px;
          color: #fff;
          text-decoration: none;
          font-size: 0.95rem;
          text-align: left;
          box-sizing: border-box;
        }
        .btn:hover { background: #1a1a1a; border-color: #aa0000; }
        .domain { color: #aa0000; font-weight: bold; }
        .sub    { color: #555; font-size: 0.75rem; display: block; margin-top: 2px; }
        h2 { color: #555; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; margin: 1.2rem 0 0.4rem; }
      </style>
    </head>
    <body>
      <h1>Singlefile Selector</h1>
      <p>Pick a CDN to load BestSpark's singlefile from.</p>

      <h2>jsdelivr mirrors</h2>
      <a class="btn" href="jsdelivr.svg"><span class="domain">cdn.jsdelivr.net</span><span class="sub">jsdelivr.svg</span></a>
      <a class="btn" href="fastly-jsdelivr.svg"><span class="domain">fastly.jsdelivr.net</span><span class="sub">fastly-jsdelivr.svg</span></a>
      <a class="btn" href="gcore-jsdelivr.svg"><span class="domain">gcore.jsdelivr.net</span><span class="sub">gcore-jsdelivr.svg</span></a>
      <a class="btn" href="b-cdn-jsdelivr.svg"><span class="domain">jsdelivr.b-cdn.net</span><span class="sub">b-cdn-jsdelivr.svg</span></a>
      <a class="btn" href="originfastly.svg"><span class="domain">originfastly.jsdelivr.net</span><span class="sub">originfastly.svg</span></a>

      <h2>githack</h2>
      <a class="btn" href="githack.svg"><span class="domain">raw.githack.com</span><span class="sub">githack.svg</span></a>
      <a class="btn" href="rawcdn-githack.svg"><span class="domain">rawcdn.githack.com</span><span class="sub">rawcdn-githack.svg</span></a>

      <h2>statically</h2>
      <a class="btn" href="statically.svg"><span class="domain">cdn.statically.io</span><span class="sub">statically.svg</span></a>

      <h2>esm.sh</h2>
      <a class="btn" href="esm.svg"><span class="domain">esm.sh</span><span class="sub">esm.svg</span></a>
      <a class="btn" href="raw-esm.svg"><span class="domain">raw.esm.sh</span><span class="sub">raw-esm.svg</span></a>
    </body>
    </html>
  </foreignObject>
</svg>
